name: TxMCCS Scraper

on:
  schedule:
    - cron: '0 * * * *'  # Runs once an hour
  workflow_dispatch:     # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Puppeteer system dependencies
        run: npx puppeteer browsers install chrome

      - name: Restore scraper data cache
        uses: actions/cache/restore@v4
        with:
          path: data.json
          key: scraper-data-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            scraper-data-

      - name: Run Scraper
        run: node txmccs_scraper.js
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}

      - name: Save scraper data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data.json
          key: scraper-data-${{ github.run_id }}-${{ github.run_attempt }}
